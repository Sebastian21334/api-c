<div class="row justify-content-center mt-4">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm">
        <div class="card-body p-4 text-center">
          <i class="bi bi-envelope-paper display-4" style="color: var(--primary)"></i>
          <h4 class="mt-2">Revisá tu email</h4>
          <p class="text-muted">Te enviamos un link de verificación.</p>
  
          <button class="btn btn-outline-primary" (click)="resend()" [disabled]="loading()">
            <i class="bi bi-arrow-repeat me-1"></i>Reenviar email
          </button>
  
          @if (message()) {
            <div class="text-success small mt-2">{{ message() }}</div>
          }
          @if (error()) {
            <div class="text-danger small mt-2">{{ error() }}</div>
          }
        </div>
      </div>
    </div>
  </div>
