<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <div class="text-center mb-4">
            <i class="bi bi-key display-5" style="color: var(--primary)"></i>
            <h3 class="mt-2 fw-bold">Recuperar contraseña</h3>
          </div>
  
          @if (error) {
            <div class="alert alert-danger d-flex align-items-center" role="alert">
              <i class="bi bi-exclamation-triangle me-2"></i>
              {{ error }}
            </div>
          }
  
          @if (sent()) {
            <div class="alert alert-success d-flex align-items-center" role="alert">
              <i class="bi bi-envelope-check me-2"></i>
              Si el email existe, recibirás un link para recuperar tu contraseña.
            </div>
            <p class="text-center mb-0">
              <a routerLink="/login">Volver al login</a>
            </p>
          } @else {
            <form (ngSubmit)="submit()" #form="ngForm">
              <div class="mb-4">
                <label for="email" class="form-label fw-medium">Email</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                  <input
                    id="email"
                    type="email"
                    class="form-control"
                    [(ngModel)]="email"
                    name="email"
                    required
                    email
                    placeholder="ejemplo@correo.com"
                  />
                </div>
              </div>
  
              <button type="submit" class="btn btn-primary w-100" [disabled]="form.invalid || loading()">
                @if (loading()) {
                  <span class="spinner-border spinner-border-sm me-1" role="status"></span>
                }
                Enviar link
              </button>
            </form>
  
            <p class="mt-4 text-center text-muted mb-0">
              <a routerLink="/login">Volver al login</a>
            </p>
          }
        </div>
      </div>
    </div>
  </div>
